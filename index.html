<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trash to Cash</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #00E676;
            --green-dim: #00C853;
            --green-glow: rgba(0, 230, 118, 0.18);
            --bg: #0D0D0D;
            --card: #161616;
            --card2: #1C1C1C;
            --border: rgba(0, 230, 118, 0.15);
            --text: #F0F0F0;
            --muted: #666;
            --radius: 18px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px 40px;
            overflow-x: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 420px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 28px;
            animation: fadeDown 0.5s ease both;
        }

        .logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--green-glow);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 16px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--green);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .logo-badge span { font-size: 14px; }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        h1 em {
            font-style: normal;
            color: var(--green);
        }

        .subtitle {
            margin-top: 8px;
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
            line-height: 1.5;
        }

        /* Upload zone */
        .upload-zone {
            background: var(--card);
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 16px;
            transition: border-color 0.3s;
            animation: fadeUp 0.5s 0.1s ease both;
            position: relative;
            overflow: hidden;
        }

        .upload-zone.has-image {
            border-style: solid;
            border-color: var(--green-dim);
            padding: 12px;
        }

        #preview {
            width: 100%;
            border-radius: 12px;
            display: none;
            max-height: 280px;
            object-fit: cover;
        }

        .upload-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .upload-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--green-glow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 4px;
        }

        .upload-placeholder p {
            font-size: 14px;
            color: var(--muted);
            font-weight: 600;
        }

        .upload-placeholder small {
            font-size: 11px;
            color: #444;
            font-family: 'Space Mono', monospace;
        }

        /* Buttons */
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
            animation: fadeUp 0.5s 0.2s ease both;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 15px 10px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .btn:active::after { opacity: 0.08; }
        .btn:active { transform: scale(0.97); }

        .btn-camera {
            background: var(--green);
            color: #0D0D0D;
            box-shadow: 0 4px 20px rgba(0,230,118,0.25);
        }

        .btn-gallery {
            background: var(--card2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-analyze {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            background: var(--green);
            color: #0D0D0D;
            font-size: 16px;
            font-weight: 800;
            font-family: 'Nunito', sans-serif;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 24px rgba(0,230,118,0.3);
            transition: all 0.2s ease;
            margin-bottom: 16px;
            animation: fadeUp 0.3s ease both;
        }

        .btn-analyze:active { transform: scale(0.98); }

        /* Loading */
        #loading {
            display: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        #loading p {
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
            font-family: 'Space Mono', monospace;
        }

        /* Result */
        #result {
            display: none;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            font-size: 14px;
            line-height: 1.75;
            color: #D0D0D0;
            animation: fadeUp 0.4s ease both;
        }

        #result .result-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        #result .result-header span {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--green);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #result .result-header .dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        #result-content strong { color: var(--green); }
        #result-content br { display: block; margin: 2px 0; }

        /* Hidden input */
        input[type="file"] { display: none; }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- Header -->
    <div class="header">
        <div class="logo-badge"><span>♻️</span> Trash to Cash</div>
        <h1>Ubah <em>Sampah</em><br>Jadi Ilmu</h1>
        <p class="subtitle">Ambil gambar sampah — AI akan beritahu<br>cara terbaik kitar semula di Malaysia.</p>
    </div>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
        <img id="preview" src="" alt="Gambar Sampah">
        <div class="upload-placeholder" id="placeholder">
            <div class="upload-icon">🗑️</div>
            <p>Tiada gambar dipilih</p>
            <small>JPG / PNG / WEBP • Maks 5MB</small>
        </div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
        <button class="btn btn-camera" onclick="openNativeCamera()">📸 Kamera</button>
        <label class="btn btn-gallery" for="galleryInput">🖼️ Album</label>
    </div>

    <input type="file" id="galleryInput" accept="image/jpeg,image/png,image/webp,image/gif">

    <!-- Analyze Button -->
    <button class="btn-analyze" id="analyzeBtn" onclick="startAnalysis()">
        🔍 Analisis Sampah
    </button>

    <!-- Loading -->
    <div id="loading">
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
        <p>AI sedang menganalisis...</p>
    </div>

    <!-- Result -->
    <div id="result">
        <div class="result-header">
            <div class="dot"></div>
            <span>Hasil Analisis</span>
        </div>
        <div id="result-content"></div>
    </div>

</div>

<script>
    // ── State ──────────────────────────────────────────────
    let currentFile = null;

    const uploadZone = document.getElementById('uploadZone');
    const placeholder = document.getElementById('placeholder');
    const preview = document.getElementById('preview');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loadingDiv = document.getElementById('loading');
    const resultDiv = document.getElementById('result');
    const resultContent = document.getElementById('result-content');
    const galleryInput = document.getElementById('galleryInput');

    // ── Gallery input ──────────────────────────────────────
    galleryInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        e.target.value = '';
        if (file) processFile(file);
    });

    // ── Process file ───────────────────────────────────────
    function processFile(file) {
        if (file.size > 5 * 1024 * 1024) {
            showError('Gambar terlalu besar. Sila pilih gambar di bawah 5MB.');
            return;
        }

        currentFile = file;

        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            placeholder.style.display = 'none';
            uploadZone.classList.add('has-image');
            analyzeBtn.style.display = 'flex';
            resultDiv.style.display = 'none';
            resultContent.innerHTML = '';
        };
        reader.readAsDataURL(file);
    }

    // ── Image Compression ──────────────────────────────────
    async function compressImage(file) {
        return new Promise((resolve) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 1024;
                let w = img.width, h = img.height;
                if (w > MAX || h > MAX) {
                    if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                    else { w = Math.round(w * MAX / h); h = MAX; }
                }
                canvas.width = w;
                canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                canvas.toBlob((blob) => {
                    URL.revokeObjectURL(url);
                    resolve(new File([blob], 'image.jpg', { type: 'image/jpeg' }));
                }, 'image/jpeg', 0.80);
            };
            img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
            img.src = url;
        });
    }

    // ── Analyze ────────────────────────────────────────────
    async function startAnalysis() {
        if (!currentFile) return;

        analyzeBtn.style.display = 'none';
        loadingDiv.style.display = 'block';
        resultDiv.style.display = 'none';

        try {
            const compressed = await compressImage(currentFile);
            const base64Image = await toBase64(compressed);
            const base64Data = base64Image.split(',')[1];
            await analyzeImage(base64Data, 'image/jpeg');
        } catch (err) {
            showError('Ralat memproses gambar: ' + (err.message || 'Cuba lagi.'));
        }
    }

    async function analyzeImage(base64Data, mimeType) {
        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mimeType, data: base64Data })
            });

            const data = await response.json();
            loadingDiv.style.display = 'none';

            if (!response.ok || !data.text) {
                throw new Error(data.error || 'Respon AI tidak sah.');
            }

            let html = escapeHtml(data.text);
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/^\* /gm, '• ');
            html = html.replace(/\n/g, '<br>');

            resultContent.innerHTML = html;
            resultDiv.style.display = 'block';
            analyzeBtn.style.display = 'flex';

        } catch (err) {
            showError('Gagal menyambung ke pelayan AI: ' + (err.message || 'Sila cuba lagi.'));
        }
    }

    // ── Kodular Camera Bridge ──────────────────────────────
    function openNativeCamera() {
        // Signal to Kodular to open native camera
        if (window.AppInventor) {
            window.AppInventor.setWebViewString("OPEN_CAMERA");
        } else {
            // Fallback for browser testing — trigger file input with capture
            const tempInput = document.createElement('input');
            tempInput.type = 'file';
            tempInput.accept = 'image/*';
            tempInput.capture = 'environment';
            tempInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) processFile(file);
            };
            tempInput.click();
        }
    }

    // Kodular calls this when WebViewString changes (camera result)
    // In Kodular blocks: WebView.WebViewStringChange → call JS receiveFromKodular(value)
    function receiveFromKodular(data) {
        if (!data) return;

        if (data.startsWith("IMAGE_PATH:")) {
            // Native file path from camera
            const imagePath = data.replace("IMAGE_PATH:", "");
            fetchLocalImage(imagePath);

        } else if (data.startsWith("IMAGE_BASE64:")) {
            // Base64 string from camera
            const b64 = data.replace("IMAGE_BASE64:", "");
            base64ToFile(b64, "camera.jpg", "image/jpeg").then(processFile);
        }
    }

    async function fetchLocalImage(path) {
        try {
            const response = await fetch(path);
            const blob = await response.blob();
            const file = new File([blob], "camera.jpg", { type: blob.type || "image/jpeg" });
            processFile(file);
        } catch (err) {
            showError("Gagal memuatkan gambar kamera: " + err.message);
        }
    }

    function base64ToFile(b64, filename, mimeType) {
        return new Promise((resolve) => {
            const byteChars = atob(b64);
            const byteArr = new Uint8Array(byteChars.length);
            for (let i = 0; i < byteChars.length; i++) {
                byteArr[i] = byteChars.charCodeAt(i);
            }
            const blob = new Blob([byteArr], { type: mimeType });
            resolve(new File([blob], filename, { type: mimeType }));
        });
    }

    // ── Helpers ────────────────────────────────────────────
    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
        });
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function showError(msg) {
        loadingDiv.style.display = 'none';
        analyzeBtn.style.display = currentFile ? 'flex' : 'none';
        resultContent.innerHTML = '⚠️ ' + escapeHtml(msg);
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
